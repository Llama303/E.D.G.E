<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>E.D.G.E. • Secure Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    
    body {
      font-family: 'Inter', system-ui, sans-serif;
    }
    
    .tail-container {
      background: linear-gradient(180deg, #0a0a0a 0%, #121212 100%);
    }
    
    .card {
      background: #1a1a1a;
      box-shadow: 0 25px 50px -12px rgb(0 0 0 / 0.5);
    }
    
    .green-glow {
      box-shadow: 0 0 25px -5px rgb(34 197 94 / 0.6);
    }
    
    .input-field {
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    }
    
    .input-field:focus {
      border-color: #22c55e;
      box-shadow: 0 0 0 4px rgba(34, 197, 94, 0.2);
    }
    
    .bio-btn {
      transition: all 0.3s cubic-bezier(0.4, 0.0, 0.2, 1);
    }
    
    .bio-btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 10px 15px -3px rgb(34 197 94 / 0.3);
    }
    
    .scan-ring {
      animation: scan 2s linear infinite;
    }
  </style>
</head>
<body class="tail-container min-h-screen flex items-center justify-center p-6">
  <div class="card max-w-md w-full rounded-3xl overflow-hidden">
    
    <!-- Header -->
    <div class="bg-black py-8 px-8 text-center">
      <h1 class="text-5xl font-bold tracking-tighter text-white">E.D.G.E.</h1>
      <p class="text-emerald-400 text-sm mt-1 tracking-[3px] font-medium">SECURE • FAST • YOURS</p>
    </div>

    <div class="p-8 pt-6">
      <h2 class="text-2xl font-semibold text-white text-center mb-8">Welcome back, Jay</h2>

      <!-- Biometric Buttons -->
      <div class="grid grid-cols-2 gap-4 mb-8">
        <!-- Face Recognition -->
        <button onclick="startFaceScan()" 
                class="bio-btn flex flex-col items-center justify-center gap-3 bg-zinc-900 hover:bg-zinc-800 border border-emerald-500/30 rounded-2xl py-6 green-glow">
          <div class="w-14 h-14 rounded-full bg-emerald-500/10 flex items-center justify-center">
            <i class="fa-solid fa-face-smile text-4xl text-emerald-400"></i>
          </div>
          <div>
            <p class="font-semibold text-white">Face Recognition</p>
            <p class="text-xs text-emerald-400">AI-protected</p>
          </div>
        </button>

        <!-- Fingerprint -->
        <button onclick="startFingerprintScan()" 
                class="bio-btn flex flex-col items-center justify-center gap-3 bg-zinc-900 hover:bg-zinc-800 border border-emerald-500/30 rounded-2xl py-6">
          <div class="w-14 h-14 rounded-full bg-emerald-500/10 flex items-center justify-center">
            <i class="fa-solid fa-fingerprint text-4xl text-emerald-400"></i>
          </div>
          <div>
            <p class="font-semibold text-white">Fingerprint</p>
            <p class="text-xs text-emerald-400">Instant unlock</p>
          </div>
        </button>
      </div>

      <div class="flex items-center gap-4 my-6">
        <div class="h-px bg-zinc-700 flex-1"></div>
        <span class="text-zinc-500 text-sm font-medium">OR</span>
        <div class="h-px bg-zinc-700 flex-1"></div>
      </div>

      <!-- Traditional Login -->
      <div class="space-y-6">
        <div>
          <label class="text-xs font-medium text-zinc-400 block mb-1.5">USERNAME OR EMAIL</label>
          <div class="relative">
            <input type="text" id="username" value="jaywright" 
                   class="input-field w-full bg-zinc-950 border border-zinc-700 rounded-2xl px-5 py-4 text-white focus:outline-none text-base">
            <i class="fa-solid fa-user absolute right-5 top-1/2 -translate-y-1/2 text-zinc-500"></i>
          </div>
        </div>

        <div>
          <label class="text-xs font-medium text-zinc-400 block mb-1.5">PASSWORD</label>
          <div class="relative">
            <input type="password" id="password" value="••••••••" 
                   class="input-field w-full bg-zinc-950 border border-zinc-700 rounded-2xl px-5 py-4 text-white focus:outline-none text-base">
            <i onclick="togglePassword()" id="eye" 
               class="fa-solid fa-eye absolute right-5 top-1/2 -translate-y-1/2 text-zinc-500 cursor-pointer"></i>
          </div>
        </div>
      </div>

      <!-- Login Button -->
      <button onclick="traditionalLogin()" 
              class="mt-8 w-full bg-emerald-500 hover:bg-emerald-600 transition-all py-5 rounded-2xl font-semibold text-lg text-white flex items-center justify-center gap-2 shadow-inner">
        <i class="fa-solid fa-arrow-right"></i>
        LOG IN SECURELY
      </button>

      <!-- Footer links -->
      <div class="flex justify-between text-sm mt-6">
        <a href="#" class="text-emerald-400 hover:text-emerald-300 transition-colors">Forgot password?</a>
        <a href="#" class="text-zinc-400 hover:text-white transition-colors">Create account</a>
      </div>

      <div class="text-center text-[10px] text-zinc-500 mt-8">
        Protected by AI deepfake detection • Face &amp; Fingerprint required to disable
      </div>
    </div>
  </div>

  <!-- Success Toast -->
  <div id="toast" class="hidden fixed bottom-6 left-1/2 -translate-x-1/2 bg-emerald-600 text-white text-sm font-medium px-8 py-4 rounded-2xl shadow-2xl flex items-center gap-3">
    <i class="fa-solid fa-circle-check"></i>
    <span id="toast-text">Logged in successfully!</span>
  </div>

  <script>
    function tailwindInit() {
      // Already initialized via CDN
    }

    function startFaceScan() {
      const toast = document.getElementById('toast');
      const text = document.getElementById('toast-text');
      text.innerHTML = '🔍 Scanning face...';
      toast.classList.remove('hidden');
      toast.style.background = '#10b981';
      
      setTimeout(() => {
        text.innerHTML = '✅ Face verified • Welcome back, Jay!';
        toast.style.background = '#22c55e';
        
        setTimeout(() => {
          toast.classList.add('hidden');
          alert("🚀 You're now logged in with Face ID!\n\n(Real app would open dashboard here)");
        }, 1800);
      }, 1400);
    }

    function startFingerprintScan() {
      const toast = document.getElementById('toast');
      const text = document.getElementById('toast-text');
      text.innerHTML = '👆 Reading fingerprint...';
      toast.classList.remove('hidden');
      
      setTimeout(() => {
        text.innerHTML = '✅ Fingerprint matched!';
        
        setTimeout(() => {
          toast.classList.add('hidden');
          alert("🔓 Fingerprint verified!\n\nWelcome to your secure E.D.G.E. account");
        }, 1200);
      }, 1100);
    }

    function traditionalLogin() {
      const username = document.getElementById('username').value;
      if (username) {
        const toast = document.getElementById('toast');
        const text = document.getElementById('toast-text');
        text.textContent = `✅ Logged in as ${username}`;
        toast.classList.remove('hidden');
        
        setTimeout(() => toast.classList.add('hidden'), 2000);
      }
    }

    function togglePassword() {
      const pw = document.getElementById('password');
      const eye = document.getElementById('eye');
      
      if (pw.type === 'password') {
        pw.type = 'text';
        eye.classList.replace('fa-eye', 'fa-eye-slash');
      } else {
        pw.type = 'password';
        eye.classList.replace('fa-eye-slash', 'fa-eye');
      }
    }

    // Auto-focus username on load
    window.onload = () => {
      document.getElementById('username').focus();
    };
  </script>
</body>
</html>
