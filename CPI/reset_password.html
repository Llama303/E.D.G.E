<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E.D.G.E – Reset password</title>
    <link rel="stylesheet" href="../Styl.css">
    <link rel="stylesheet" href="../EDGE.css">
    <link rel="stylesheet" href="../themes.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Jersey+10&family=Oswald&family=Platypi:ital,wght@0,300..800;1,300..800&display=swap" rel="stylesheet">
</head>
<body class="themeable flex items-center justify-center min-h-screen">
    <button type="button" id="theme-toggle" class="theme-toggle" aria-label="Toggle dark/light theme" title="Toggle theme">
        <span class="icon-sun" aria-hidden="true">☀</span>
        <span class="icon-moon" aria-hidden="true">🌙</span>
    </button>

    <div class="auth-card container rounded-lg p-6 flex flex-col items-center justify-center w-96 max-w-[96vw] shadow-xl border">
        <h1 class="text-2xl font-bold cursor-default mb-3">E.D.G.E</h1>
        <h2 class="text-xl font-semibold cursor-default mb-4 auth-muted">Reset password</h2>

        <div id="reset-error" class="auth-error text-sm text-center min-h-[1.25rem] mb-2" aria-live="polite" role="alert"></div>
        <div id="reset-success" class="text-[#2fa12f] text-sm text-center min-h-[1.25rem] mb-2" aria-live="polite"></div>

        <form id="reset-form" class="text-[#000000] space-y-3 w-full">
            <input
                type="password"
                id="new_password"
                placeholder="New password"
                required
                autocomplete="new-password"
                class="w-full p-2 rounded-lg focus:ring-2 focus:ring-[#2fa12f] focus:outline-none">
            <input
                type="password"
                id="new_password_confirm"
                placeholder="Confirm new password"
                required
                autocomplete="new-password"
                class="w-full p-2 rounded-lg focus:ring-2 focus:ring-[#2fa12f] focus:outline-none">

            <button
                type="submit"
                id="reset-btn"
                class="w-full text-white bg-[#2fa12f] hover:bg-[#3f7e42] rounded-lg p-2.5 font-medium focus:ring-2 focus:ring-[#2fa12f] focus:outline-none transition-colors">
                Update password
            </button>
        </form>

        <p class="auth-muted text-sm mt-4 text-center">
            Back to <a href="login.html" class="text-[#2fa12f] underline hover:no-underline">Log in</a>.
        </p>
    </div>

    <script src="../themes.js"></script>
    <script src="supabase_config.js"></script>
    <script type="module">
        import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

        const errEl = document.getElementById('reset-error');
        const successEl = document.getElementById('reset-success');
        const btn = document.getElementById('reset-btn');

        const url = window.SUPABASE_URL;
        const key = window.SUPABASE_ANON_KEY;
        if (!url || !key || url.includes('YOUR_') || key.includes('YOUR_')) {
            errEl.textContent = 'Supabase not configured. Set SUPABASE_URL and SUPABASE_ANON_KEY in supabase_config.js';
        } else {
            const supabase = createClient(url, key);

            // If user lands here from the email link, Supabase will include tokens in the URL.
            // Just try to read session; if missing, show a message.
            const { data: { session } } = await supabase.auth.getSession();
            if (!session) {
                errEl.textContent = 'Reset link is missing/expired. Go back and request a new reset email.';
                btn.disabled = true;
            }

            document.getElementById('reset-form').addEventListener('submit', async (e) => {
                e.preventDefault();
                errEl.textContent = '';
                successEl.textContent = '';

                const p1 = document.getElementById('new_password').value;
                const p2 = document.getElementById('new_password_confirm').value;

                if (p1.length < 8) { errEl.textContent = 'Password must be at least 8 characters.'; return; }
                if (!/[A-Z]/.test(p1)) { errEl.textContent = 'Password must include at least one uppercase letter.'; return; }
                if (!/[a-z]/.test(p1)) { errEl.textContent = 'Password must include at least one lowercase letter.'; return; }
                if (!/[0-9]/.test(p1)) { errEl.textContent = 'Password must include at least one number.'; return; }
                if (!/[!@#$%^&*()_+\-=\[\]{};':"\\|,.<>\/?]/.test(p1)) { errEl.textContent = 'Password must include at least one special character.'; return; }
                if (p1 !== p2) { errEl.textContent = 'Passwords do not match.'; return; }

                btn.disabled = true;
                btn.textContent = 'Updating…';
                const { error } = await supabase.auth.updateUser({ password: p1 });
                if (error) {
                    errEl.textContent = error.message || 'Failed to update password.';
                    btn.disabled = false;
                    btn.textContent = 'Update password';
                    return;
                }
                successEl.textContent = 'Password updated. You can now log in.';
                setTimeout(() => { window.location.href = 'login.html'; }, 800);
            });
        }
    </script>
</body>
</html>
