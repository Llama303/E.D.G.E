<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E.D.G.E</title>
    <link rel="stylesheet" href="../Styl.css">
    <link rel="stylesheet" href="../EDGE.css">
    <link rel="stylesheet" href="../themes.css">
    <link href="https://fonts.googleapis.com/css2?family=Jersey+10&family=Oswald&family=Gravitas One&family=Platypi:ital,wght@0,300..800;1,300..800&display=swap" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Jersey+10&display=swap" rel="stylesheet">
</head>
<body class="themeable flex items-center justify-center min-h-screen">
    
    <button type="button" id="theme-toggle" class="theme-toggle" aria-label="Toggle dark/light theme" title="Toggle theme">
        <span class="icon-sun" aria-hidden="true">☀</span>
        <span class="icon-moon" aria-hidden="true">🌙</span>
    </button>

    <div class="auth-card container rounded-lg p-6 flex flex-col items-center justify-center w-96 max-w-[96vw] shadow-xl border">
        <h1 class="text-2xl font-bold cursor-default mb-3">E.D.G.E</h1>
        <h1 class="text-2xl font-bold cursor-default mb-2">Enter Information</h1>

    <div id="signup-error" class="auth-error text-sm text-center min-h-[1.25rem] mb-2" aria-live="polite" role="alert"></div>
    <div id="signup-success" class="text-[#2fa12f] text-sm text-center min-h-[1.25rem] mb-2" aria-live="polite"></div>

    <form action="verify_identity.php" method="post" enctype="multipart/form-data" class="text-[#000000] space-y-3 w-full">
        <!-- Full name -->
        <input
            type="text"
            name="full_name"
            id="full_name"
            placeholder="Full name"
            required
            class="w-full p-2 rounded-lg focus:ring-2 focus:ring-[#2fa12f] focus:outline-none">

        <!-- Email address -->
        <input
            type="email"
            name="email"
            id="email"
            placeholder="Email address"
            required
            class="w-full p-2 rounded-lg focus:ring-2 focus:ring-[#2fa12f] focus:outline-none">

        <!-- Phone number -->
        <input type="tel" name="phone" id="phone" placeholder="Phone number" required 
       class="w-full p-2 rounded-lg focus:ring-2 focus:ring-[#2fa12f] focus:outline-none">

        <!-- Date of birth -->
        <label class="block text-sm font-medium text-gray-200">
            Date of birth
            <input type="date" name="dob" id="dob" required class="mt-1 w-full p-2 rounded-lg text-black focus:ring-2 focus:ring-[#2fa12f] focus:outline-none">
          </label>

        <!-- Government ID type + number -->
        <div class="flex gap-2">
            <select
                name="gov_id_type"
                id="gov_id_type"
                required
                class="w-1/2 p-2 rounded-lg focus:ring-2 focus:ring-[#2fa12f] focus:outline-none">
                <option value="">Select ID type</option>
                <option value="passport">Passport</option>
                <option value="drivers_license">Driver's licence</option>
                <option value="national_id">National ID</option>
            </select>
            <input
                type="text"
                name="gov_id_number"
                id="gov_id_number"
                placeholder="ID number"
                required
                class="w-1/2 p-2 rounded-lg focus:ring-2 focus:ring-[#2fa12f] focus:outline-none">
        </div>

        <!-- Government ID upload -->
        <label class="block text-sm font-medium text-gray-200">Upload government ID (image or PDF)
            <input
                type="file"
                name="gov_id_file"
                id="gov_id_file"
                accept=".jpg,.jpeg,.png,.pdf"
                required
                class="mt-1 block w-full text-sm file:mr-3 file:py-1.5 file:px-3 file:rounded-md file:border-0 file:text-sm file:font-medium file:bg-[#2fa12f] file:text-white hover:file:bg-[#3f7e42]">
        </label>

        <!-- Proof of address upload -->
        <label class="block text-sm font-medium text-gray-200">Proof of address (utility bill, bank statement, etc.)
            <input
                type="file"
                name="proof_of_address"
                id="proof_of_address"
                accept=".jpg,.jpeg,.png,.pdf"
                required
                class="mt-1 block w-full text-sm file:mr-3 file:py-1.5 file:px-3 file:rounded-md file:border-0 file:text-sm file:font-medium file:bg-[#2fa12f] file:text-white hover:file:bg-[#3f7e42]">
        </label>

        <!-- Financial profile -->
        <h2 class="text-lg font-semibold text-white mt-4">Financial profile</h2>

        <!-- Employment status -->
        <label class="block text-sm font-medium text-gray-200">Employment status
            <select
                name="employment_status"
                id="employment_status"
                required
                class="mt-1 w-full p-2 rounded-lg text-black focus:ring-2 focus:ring-[#2fa12f] focus:outline-none">
                <option value="">Select status</option>
                <option value="employed">Employed</option>
                <option value="self_employed">Self-employed</option>
                <option value="student">Student</option>
                <option value="retired">Retired</option>
                <option value="unemployed">Unemployed</option>
                <option value="other">Other</option>
            </select>
        </label>

        <!-- Occupation -->
        <input
            type="text"
            name="occupation"
            id="occupation"
            placeholder="Occupation / job title"
            class="w-full p-2 rounded-lg focus:ring-2 focus:ring-[#2fa12f] focus:outline-none">

        <!-- Employr name -->
        <input
            type="text"
            name="employer_name"
            id="employer_name"
            placeholder="Name of employer (or 'Self-employed')"
            class="w-full p-2 rounded-lg focus:ring-2 focus:ring-[#2fa12f] focus:outline-none">

        <!-- Income sources -->
        <label class="block text-sm font-medium text-gray-200">Income sources
            <textarea
                name="income_sources"
                id="income_sources"
                placeholder="Salary, business income, investments, etc."
                rows="3"
                required
                class="mt-1 w-full p-2 text-black rounded-lg focus:ring-2 focus:ring-[#2fa12f] focus:outline-none"></textarea>
        </label>

        <!-- Account intent -->
        <h2 class="text-lg font-semibold text-white mt-4">Account intent</h2>

        <label class="block text-sm font-medium text-gray-200">Purpose of opening this account
            <textarea
                name="account_purpose"
                id="account_purpose"
                placeholder="e.g. saving, investing, salary deposits, payments"
                rows="2"
                required
                class="mt-1 w-full p-2 rounded-lg text-black focus:ring-2 focus:ring-[#2fa12f] focus:outline-none"></textarea>
        </label>

        <label class="block text-sm font-medium text-gray-200">Expected nature of transactions
            <textarea
                name="transaction_nature"
                id="transaction_nature"
                placeholder="Typical transaction size, frequency, and counterparties"
                rows="2"
                required
                class="mt-1 w-full p-2 text-black rounded-lg focus:ring-2 focus:ring-[#2fa12f] focus:outline-none"></textarea>
        </label>

        <!-- Biometrics -->
        <h2 class="text-lg font-semibold text-white mt-4">Biometrics</h2>

        <div class="mt-6 border-t border-gray-700 pt-4">
            <h2 class="text-lg font-semibold text-white mb-2">Biometric Verification</h2>
            
            <label class="block text-sm font-medium text-gray-200">Verification Method
                <select name="biometric_type" id="biometric_type" required class="mt-1 w-full p-2 rounded-lg text-black focus:ring-2 focus:ring-[#2fa12f]">
                    <option value="">Select method</option>
                    <option value="photo">Upload Photo (Selfie)</option>
                    <option value="fingerprint">Upload Fingerprint</option>
                    <option value="face_scan">Live Face Scan</option>
                </select>
            </label>
        
            <div id="biometric_upload_container" class="mt-3">
                <label class="block text-sm font-medium text-gray-200">
                    <span id="biometric_file_label_text">Upload file</span>
                    <input type="file" name="biometric_file" id="biometric_file" accept="image/*" class="mt-1 block w-full text-sm text-gray-400 file:mr-3 file:py-1 file:px-3 file:rounded-md file:border-0 file:bg-[#2fa12f] file:text-white">
                </label>
            </div>
           
            <div id="face_scan_container" class="mt-3 hidden">
                <div class="relative w-full aspect-video bg-black rounded-lg overflow-hidden border-2 border-gray-600">
                    <video id="video" class="w-full h-full object-cover" autoplay playsinline></video>
                    <canvas id="canvas" class="hidden"></canvas>
                    <div id="scan_overlay" class="absolute inset-0 border-2 border-dashed border-[#2fa12f] opacity-50 rounded-full m-8 pointer-events-none"></div>
                </div>
                <div class="flex items-center justify-between mt-2">
                    <button type="button" id="capture_btn" class="bg-[#2fa12f] text-white px-4 py-1.5 rounded-md hover:bg-[#3f7e42]">Capture Face</button>
                    <span id="scan_status" class="text-xs text-yellow-400">Camera ready...</span>
                </div>
                <input type="hidden" name="face_scan_data" id="face_scan_data">
            </div>
        </div>

        <label class="flex items-start gap-2 text-sm text-gray-200 cursor-pointer mt-4">
            <input
                type="checkbox"
                name="agree_terms"
                id="agree_terms"
                value="1"
                class="mt-1 rounded focus:ring-2 focus:ring-[#2fa12f] focus:outline-none">
            <span>I have read and agree to the <a href="terms.html" target="_blank" class="text-[#2fa12f] underline hover:no-underline">Terms and Conditions</a>.</span>
        </label>

        <button
            type="submit"
            name="submit_cpi"
            value="1"
            class="w-full text-white bg-[#2fa12f] hover:bg-[#3f7e42] rounded-lg p-2.5 font-medium focus:ring-2 focus:ring-[#2fa12f] focus:outline-none transition-colors">
            Continue
        </button>
    </form>
    <p class="auth-muted text-sm mt-4 text-center w-full">
        Already have an account? <a href="login.html" class="text-[#2fa12f] underline hover:no-underline">Log in</a>.
    </p>
    <script src="../themes.js"></script>
    <script src="Cpi.js"></script>
</body>
</html>
