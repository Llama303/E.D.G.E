<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E.D.G.E - Log in</title>
    <link rel="stylesheet" href="../Styl.css">
    <link rel="stylesheet" href="../EDGE.css">
    <link rel="stylesheet" href="../themes.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Jersey+10&family=Oswald&family=Platypi:ital,wght@0,300..800;1,300..800&display=swap" rel="stylesheet">
</head>s
<body class="themeable flex items-center justify-center min-h-screen">
    <button type="button" id="theme-toggle" class="theme-toggle" aria-label="Toggle dark/light theme" title="Toggle theme">
        <span class="icon-sun" aria-hidden="true">☀</span>
        <span class="icon-moon" aria-hidden="true">🌙</span>
    </button>s

    <div class="auth-card container rounded-lg p-6 flex flex-col items-center justify-center w-96 max-w-[96vw] shadow-xl border">
        <h1 class="text-2xl font-bold cursor-default mb-3">E.D.G.E</h1>
        <h2 class="text-xl font-semibold cursor-default mb-4 auth-muted">Log in</h2>

        <div id="login-error" class="auth-error text-sm text-center min-h-[1.25rem] mb-2" aria-live="polite" role="alert"></div>
        <div id="login-success" class="text-[#2fa12f] text-sm text-center min-h-[1.25rem] mb-2" aria-live="polite"></div>

        <form id="login-form" class="text-[#000000] space-y-3 w-full">
            <input
                type="email"
                name="email"k
                id="email"
                placeholder="Email address"
                required
                autocomplete="email"
                class="w-full p-2 rounded-lg focus:ring-2 focus:ring-[#2fa12f] focus:outline-none">
            <input
                type="password"
                name="password"
                id="password"
                placeholder="Password"
                required
                autocomplete="current-password"
                class="w-full p-2 rounded-lg focus:ring-2 focus:ring-[#2fa12f] focus:outline-none">
            <button
                type="submit"
                id="submit-btn"
                class="w-full text-white bg-[#2fa12f] hover:bg-[#3f7e42] rounded-lg p-2.5 font-medium focus:ring-2 focus:ring-[#2fa12f] focus:outline-none transition-colors">
                Log in
            </button>
            <button
                type="button"
                id="forgot-btn"
                class="w-full text-[#2fa12f] bg-transparent hover:underline rounded-lg p-2 font-medium focus:outline-none transition-colors">
                Forgot password?
            </button>
        </form>

        <p class="auth-muted text-sm mt-4 text-center">
            Don't have an account? <a href="CPI.html" class="text-[#2fa12f] underline hover:no-underline">Sign up</a> (complete CPI).
        </p>
    </div>

    <script src="../themes.js"></script>
    <script src="supabase_config.js"></script>
    <script type="module">
        import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

        const url = window.SUPABASE_URL;
        const key = window.SUPABASE_ANON_KEY;
        if (!url || !key || url.includes('YOUR_') || key.includes('YOUR_')) {
            document.getElementById('login-error').textContent = 'Supabase not configured. Set SUPABASE_URL and SUPABASE_ANON_KEY in supabase_config.js';
            document.getElementById('login-form').querySelector('button[type="submit"]').disabled = true;
        } else {
            const supabase = createClient(url, key);

            document.getElementById('login-form').addEventListener('submit', async (e) => {
                e.preventDefault();
                const errEl = document.getElementById('login-error');
                const successEl = document.getElementById('login-success');
                const btn = document.getElementById('submit-btn');
                errEl.textContent = '';
                successEl.textContent = '';
                btn.disabled = true;
                btn.textContent = 'Signing in…';

                const email = document.getElementById('email').value.trim();
                const password = document.getElementById('password').value;

                const { data, error } = await supabase.auth.signInWithPassword({ email, password });

                if (error) {
                    errEl.textContent = error.message || 'Login failed.';
                    btn.disabled = false;
                    btn.textContent = 'Log in';
                    return;
                }
                successEl.textContent = 'Success. Redirecting…';
                window.location.href = 'DESKTOP/DASHBOARD.html';
            });

            document.getElementById('forgot-btn').addEventListener('click', async () => {
                const errEl = document.getElementById('login-error');
                const successEl = document.getElementById('login-success');
                errEl.textContent = '';
                successEl.textContent = '';

                const email = document.getElementById('email').value.trim();
                if (!email) {
                    errEl.textContent = 'Enter your email first, then click “Forgot password?”.';
                    return;
                }

                const redirectTo = window.location.origin + '/edge/CPI/reset_password.html';
                const { error } = await supabase.auth.resetPasswordForEmail(email, { redirectTo });
                if (error) {
                    errEl.textContent = error.message || 'Failed to send reset email.';
                    return;
                }
                successEl.textContent = 'Password reset email sent. Check your inbox (and spam).';
            });
        }
    </script>
</body>
</html>
