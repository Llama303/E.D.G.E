<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>E.D.G.E | Secure Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .scanner-ring { border: 2px solid #00ff41; box-shadow: 0 0 15px #00ff41; }
        .scan-line { position: absolute; width: 100%; height: 2px; background: #00ff41; top: 0; animation: scan 2s infinite linear; }
        @keyframes scan { 0% { top: 0; } 100% { top: 100%; } }
    </style>
</head>
<body class="bg-black text-white flex flex-col items-center justify-center min-h-screen">
    <div class="text-center mb-8">
        <h1 class="text-4xl font-bold tracking-widest text-[#00ff41]">AUTHENTICATION REQUIRED</h1>
        <p class="text-gray-500 text-sm mt-2">SCAN FACE TO DECRYPT DESKTOP</p>
    </div>

    <div class="relative scanner-ring rounded-full overflow-hidden w-[300px] h-[300px]">
        <video id="video" class="w-full h-full object-cover scale-x-[-1]" autoplay muted></video>
        <div class="scan-line"></div>
    </div>

    <div id="status" class="mt-6 font-mono text-sm text-gray-400 uppercase">Detecting Hardware...</div>
    
    <button id="login-btn" class="mt-8 bg-[#00ff41] text-black px-10 py-3 rounded-sm font-bold hover:bg-green-400 transition-all">
        VERIFY IDENTITY
    </button>

    <script src="../supabase_config.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <script type="module">
        import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';
        const supabase = createClient(window.SUPABASE_URL, window.SUPABASE_ANON_KEY);

        const video = document.getElementById('video');
        const status = document.getElementById('status');
        const loginBtn = document.getElementById('login-btn');

        async function init() {
            const MODEL_URL = 'https://cdn.jsdelivr.net/gh/justadudewhohacks/face-api.js@0.22.2/models/';
            await Promise.all([
                faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL),
                faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL),
                faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL)
            ]);
            const stream = await navigator.mediaDevices.getUserMedia({ video: {} });
            video.srcObject = stream;
            status.innerText = "BIOMETRIC SCANNER READY";
        }

        loginBtn.addEventListener('click', async () => {
            status.innerText = "MATCHING BIOMETRICS...";
            
            // Get last registered user for testing
            const { data } = await supabase.from('cpi_submissions').select('face_descriptor, full_name').order('created_at', { ascending: false }).limit(1).single();

            if (!data) { status.innerText = "NO RECORD FOUND"; return; }

            const detection = await faceapi.detectSingleFace(video, new faceapi.TinyFaceDetectorOptions()).withFaceLandmarks().withFaceDescriptor();

            if (detection) {
                const distance = faceapi.euclideanDistance(new Float32Array(JSON.parse(data.face_descriptor)), detection.descriptor);
                if (distance < 0.6) {
                    status.innerText = "IDENTITY CONFIRMED";
                    sessionStorage.setItem('isVerified', 'true');
                    setTimeout(() => window.location.href = '../DESKTOP/desktop.html', 1000);
                } else {
                    status.innerText = "MATCH FAILED";
                }
            } else {
                status.innerText = "FACE NOT DETECTED";
            }
        });
        init();
    </script>
</body>
</html>
