<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>E.D.G.E - Face Scan Verification</title>

<link rel="stylesheet" href="../Styl.css">
<link rel="stylesheet" href="../EDGE.css">
<link rel="stylesheet" href="../themes.css">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Jersey+10&family=Oswald&family=Gravitas+One&family=Platypi:wght@300;400;600&display=swap" rel="stylesheet">

<style>

body{
    font-family: "Oswald", sans-serif;
    background:#0f172a;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}
.auth-card{
    background:#1e293b;
    padding:30px;
    border-radius:10px;
    text-align:center;
    width:420px;
}
video{
    border-radius:10px;
    border:3px solid #22c55e;
    margin-bottom:15px;
}
button{
    padding:12px 20px;
    font-size:16px;
    border:none;
    border-radius:6px;
    background:#22c55e;
    color:white;
    cursor:pointer;
}
button:disabled{
    background:#64748b;
}
#status{
    margin-top:15px;
    font-size:14px;
    color:#facc15;
}</style>
</head>

<body>

<div class="auth-card">

<h1>Face Scan Verification</h1>

<p>Please position your face in front of the camera and press capture.</p>

<video id="video" width="400" height="300" autoplay playsinline></video>
<canvas id="canvas" style="display:none;"></canvas>
<button id="capture" disabled>Capture Face</button>

<div id="status">Initializing camera...</div>

</div>
<script>

const video = document.getElementById("video");
const captureBtn = document.getElementById("capture");
const status = document.getElementById("status");

/* 
   Check CPI ID exists
 */

const cpi_id = localStorage.getItem("cpi_id");

if(!cpi_id){

    status.textContent = "Session expired. Please restart registration.";

    captureBtn.disabled = true;

}

/* 
   Camera initialization feedback
 */

video.addEventListener("loadedmetadata",()=>{
    status.textContent = "Camera ready. You may capture your face.";
    captureBtn.disabled = false;
});

/* 
   Camera error fallback
 */

navigator.mediaDevices.getUserMedia({video:true})
.catch(()=>{
    status.textContent="Camera access denied. Please allow camera permission.";
});

</script>

<script src="face_scan.js"></script>

</body>
</html>
