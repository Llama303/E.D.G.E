<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>E.D.G.E. — Update Personal Information</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <style>
    :root {
      --bg: #0f0f0f;
      --card: #1a1a1a;
      --text: #f0f0f0;
      --text-light: #a0a0a0;
      --green: #22c55e;
      --green-dark: #16a34a;
      --accent: #22c55e;
      --border: #333;
      --shadow: rgba(0,0,0,0.6);
      --red: #ef4444;
    }

    [data-theme="light"] {
      --bg: #f8f9fa;
      --card: #ffffff;
      --text: #111111;
      --text-light: #6b7280;
      --green: #15803d;
      --accent: #15803d;
      --border: #e5e7eb;
      --shadow: rgba(0,0,0,0.08);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      transition: background 0.4s, color 0.4s;
    }

    .header {
      background: var(--card);
      padding: 1.2rem 1.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .header h1 {
      font-size: 1.35rem;
      font-weight: 600;
    }

    .back-btn {
      background: none;
      border: none;
      color: var(--text-light);
      font-size: 1.4rem;
      cursor: pointer;
    }

    .container {
      max-width: 460px;
      margin: 1.5rem auto;
      padding: 0 1.5rem;
    }

    .profile-card {
      background: var(--card);
      border-radius: 16px;
      padding: 2rem 1.8rem;
      border: 1px solid var(--border);
      box-shadow: 0 8px 25px var(--shadow);
    }

    .title {
      font-size: 1.5rem;
      font-weight: 600;
      margin-bottom: 0.5rem;
    }

    .subtitle {
      color: var(--text-light);
      font-size: 0.95rem;
      margin-bottom: 2rem;
    }

    .save-btn {
      background: var(--green);
      color: white;
      border: none;
      padding: 0.9rem 1.8rem;
      border-radius: 10px;
      font-weight: 600;
      cursor: pointer;
      font-size: 1rem;
      transition: background 0.2s;
      float: right;
    }

    .save-btn:hover {
      background: var(--green-dark);
    }

    .form-group {
      margin-bottom: 1.6rem;
    }

    .label {
      display: block;
      font-size: 0.95rem;
      font-weight: 500;
      margin-bottom: 0.5rem;
      color: var(--text-light);
    }

    .required::after {
      content: "*";
      color: var(--red);
      margin-left: 0.25rem;
    }

    input[type="text"],
    input[type="email"],
    input[type="password"],
    select {
      width: 100%;
      padding: 0.9rem 1rem;
      background: #222;
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-size: 1rem;
      transition: border 0.2s;
    }

    input:focus,
    select:focus {
      outline: none;
      border-color: var(--green);
      box-shadow: 0 0 0 3px rgba(34,197,94,0.15);
    }

    .profile-photo {
      text-align: center;
      margin-bottom: 2rem;
    }

    .photo-wrapper {
      width: 120px;
      height: 120px;
      margin: 0 auto 0.8rem;
      border-radius: 50%;
      overflow: hidden;
      border: 3px solid var(--border);
      position: relative;
    }

    .photo-wrapper img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .upload-label {
      color: var(--green);
      font-size: 0.9rem;
      cursor: pointer;
      display: inline-block;
      margin-top: 0.5rem;
    }

    .hint {
      font-size: 0.85rem;
      color: var(--text-light);
      margin-top: 0.4rem;
      line-height: 1.4;
    }

    .password-group {
      margin-top: 2.2rem;
      padding-top: 1.8rem;
      border-top: 1px solid var(--border);
    }

    @media (max-width: 480px) {
      .container { padding: 0 1rem; }
      .profile-card { padding: 1.6rem 1.4rem; }
      .save-btn { width: 100%; float: none; margin-top: 1.5rem; }
    }
  </style>
</head>
<body>

  <div class="header">
    <button class="back-btn" onclick="history.back()"><i class="fa-solid fa-arrow-left"></i></button>
    <h1>My profile</h1>
    <div style="width:44px;"></div> <!-- spacer -->
  </div>

  <div class="container">
    <div class="profile-card">

      <div style="display:flex; justify-content:space-between; align-items:flex-start; flex-wrap:wrap; gap:1rem; margin-bottom:1.5rem;">
        <div>
          <h2 class="title">My profile</h2>
          <p class="subtitle">Update your personal information below</p>
        </div>
        <button class="save-btn">Save changes</button>
      </div>

      <div class="form-group profile-photo">
        <div class="label">Profile photo</div>
        <div class="photo-wrapper">
          <!-- Placeholder – in real app this would be user's uploaded photo -->
          <img src="https://images.unsplash.com/photo-1494790108377-be9c29b29330?w=400" alt="Profile photo">
        </div>
        <label class="upload-label" for="photo-upload">
          <i class="fa-solid fa-camera"></i> Change photo
        </label>
        <input type="file" id="photo-upload" accept="image/*" hidden>
      </div>

      <div class="form-group">
        <label class="label required" for="first-name">First name</label>
        <input type="text" id="first-name" value="Jay" required>
      </div>

      <div class="form-group">
        <label class="label required" for="last-name">Last name</label>
        <input type="text" id="last-name" value="Wright" required>
      </div>

      <div class="form-group">
        <label class="label" for="email">Email address</label>
        <input type="email" id="email" value="jaywright@example.com" placeholder="you@example.com">
      </div>

      <div class="form-group">
        <label class="label required" for="language">Language</label>
        <select id="language" required>
          <option selected>English</option>
          <option>Spanish</option>
          <option>French</option>
          <option>Other</option>
        </select>
      </div>

      <div class="password-group">
        <div class="form-group">
          <label class="label" for="password">Password</label>
          <input type="password" id="password" placeholder="Leave this blank to keep current password">
          <p class="hint">Leave this blank to keep your current password.</p>
        </div>

        <div class="form-group">
          <label class="label" for="retype-password">Retype password</label>
          <input type="password" id="retype-password" placeholder="Retype your password to confirm the change">
          <p class="hint">Retype your password to confirm the change.</p>
        </div>
      </div>

    </div>
  </div>

  <script>
    // Optional: basic photo preview (for demo)
    document.getElementById('photo-upload')?.addEventListener('change', function(e) {
      const file = e.target.files[0];
      if (file) {
        const reader = new FileReader();
        reader.onload = function(ev) {
          document.querySelector('.photo-wrapper img').src = ev.target.result;
        };
        reader.readAsDataURL(file);
      }
    });
  </script>

</body>
</html>
